<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your identity</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f0fdfa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f0fdfa; padding: 40px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 12px; overflow: hidden; max-width: 480px; width: 100%;">
          <!-- Header -->
          <tr>
            <td style="background-color: #0d9488; padding: 24px 32px;">
              <span style="color: #ffffff; font-size: 20px; font-weight: 700; letter-spacing: -0.02em;">SOP Assistant</span>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding: 32px;">
              <h1 style="margin: 0 0 16px; font-size: 22px; font-weight: 600; color: #18181b;">Confirm your identity</h1>
              <p style="margin: 0 0 24px; font-size: 15px; line-height: 1.6; color: #374151;">
                Enter this verification code to confirm your identity on SOP Assistant:
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto 24px; text-align: center;" width="100%">
                <tr>
                  <td style="background-color: #f0fdfa; border: 2px solid #0d9488; border-radius: 8px; padding: 16px 32px;">
                    <span style="font-size: 32px; font-weight: 700; letter-spacing: 0.3em; color: #0d9488;">{{ .Token }}</span>
                  </td>
                </tr>
              </table>
              <p style="margin: 0; font-size: 13px; line-height: 1.5; color: #6b7280;">
                This code will expire shortly. If you didn't request this, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding: 24px 32px; border-top: 1px solid #e5e7eb;">
              <p style="margin: 0; font-size: 12px; color: #9ca3af; text-align: center;">
                SOP Assistant &mdash; This is an automated message.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
