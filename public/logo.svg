  <line x1="37.5" y1="20" x2="34.5" y2="20" stroke="#2AA5A0" stroke-width="1.5"/>
  <line x1="20" y1="37.5" x2="20" y2="34.5" stroke="#2AA5A0" stroke-width="1.5"/>
  <line x1="2.5" y1="20" x2="5.5" y2="20" stroke="#2AA5A0" stroke-width="1.5"/>
  <!-- Diamond/compass needle -->
  <path d="M20 6 L26 20 L20 34 L14 20 Z" fill="#2AA5A0"/>
  <path d="M20 6 L26 20 L20 20 L14 20 Z" fill="#1D7A76"/>
